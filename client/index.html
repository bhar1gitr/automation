<!DOCTYPE html>
<html>

<head>
    <title>Voter App Builder</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #dbeafe, #e0e7ff);
            margin: 0;
            padding: 0;
        }
        .header {
            text-align: center;
            padding: 30px 10px;
        }
        .header h1 {
            margin: 0;
        }
        .header p {
            color: #555;
        }
        .container {
            width: 800px;
            margin: auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            padding: 20px;
            display: flex;
            gap: 20px;
        }
        .left,
        .right {
            flex: 1;
        }
        .section {
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }  
        .section h3 {
            margin-top: 0;
            font-size: 16px;
        }

        input,
        button {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            background: #3b82f6;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }

        button:hover {
            background: #2563eb;
        }

        .generate-btn {
            margin-top: 10px;
        }

        #status {
            text-align: center;
            margin-top: 15px;
            font-weight: 500;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>Voter App Builder</h1>
        <p>Create custom voter engagement apps easily</p>
    </div>

    <div class="container">

        <!-- LEFT SIDE -->
        <div class="left">
            <div class="section">
                <h3>Step 1: Configuration</h3>

                <label>Project Name</label>
                <input type="text" placeholder="MyVoterApp">

                <label>App Package</label>
                <input type="text" placeholder="com.example.voterapp">

                <label>App Icon</label>
                <input type="file">
            </div>
        </div>

        <!-- RIGHT SIDE -->
        <div class="right">
            <div class="section">
                <h3>Step 2: Upload File</h3>

                <input type="file" id="file">
            </div>

            <div class="section">
                <h3>Step 3: Build</h3>

                <button class="generate-btn" onclick="upload()">Generate APK</button>
            </div>
        </div>

    </div>

    <div id="status"></div>

    <script>
        async function upload() {
            const fileInput = document.getElementById("file");
            const file = fileInput.files[0];
            const status = document.getElementById("status");

            if (!file) {
                alert("Select file first!");
                return;
            }

            const formData = new FormData();
            formData.append("file", file);

            status.innerText = "⏳ Building APK...";

            try {
                const res = await fetch("http://localhost:5000/upload", {
                    method: "POST",
                    body: formData
                });

                const data = await res.json();

                status.innerHTML = `
                    ✅ APK Ready <br>
                    <a href="${data.downloadUrl}" target="_blank">⬇ Download</a>
                `;
            } catch (err) {
                status.innerText = "❌ Error";
            }
        }
    </script>

</body>

</html>
